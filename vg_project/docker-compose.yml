services:
  dashboard:
    build: .
    container_name: vg-dashboard
    ports:
      - "8501:8501"
    environment:
      # Optional: enable LLM-assisted insights
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - LOVABLE_API_KEY=${LOVABLE_API_KEY:-}
    volumes:
      - ./data:/app/data        # drop your CSVs here
      - ./db:/app/db            # persist SQLite DB
      - ./config:/app/config    # persist users.yaml
    restart: unless-stopped
